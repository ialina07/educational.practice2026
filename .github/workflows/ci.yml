name: CI

on:
  push:
    branches: [ main, implementation ]
  pull_request:
    branches: [ main ]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14
      - name: Check formatting
        run: |
          find src/ tests/ -name '*.c' -o -name '*.h' | \
          xargs clang-format-14 --dry-run --Werror

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-14
      - name: Run clang-tidy
        run: |
          for file in src/*.c; do
            clang-tidy-14 "$file" -- -Isrc || true
          done

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: make
      - name: Run tests
        run: make testAll